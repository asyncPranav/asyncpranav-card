<svg width="1000" height="570" viewBox="0 0 1000 570" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Cascadia Code','Fira Code','JetBrains Mono',Consolas,ui-monospace,monospace; }
