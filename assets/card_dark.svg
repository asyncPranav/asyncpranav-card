  <!-- right: neofetch info dump -->
  <text x="410" y="30"><tspan class="user">readme@asyncPranav</tspan><tspan class="cc"> ------------------------------------------------------------</tspan></text>
  <text x="410" y="50"><tspan class="cc">. </tspan><tspan class="key">OS</tspan><tspan class="cc">: ........................ </tspan><tspan class="value">{{OS}}</tspan></text>
  <text x="410" y="70"><tspan class="cc">. </tspan><tspan class="key">Uptime</tspan><tspan class="cc">: .................... </tspan><tspan id="age_data" class="value">{{AGE_DATA}}</tspan></text>
  <text x="410" y="90"><tspan class="cc">. </tspan><tspan class="key">Editor</tspan><tspan class="cc">: .................... </tspan><tspan class="value">{{EDITOR}}</tspan></text>
  <text x="410" y="110"><tspan class="cc">. </tspan><tspan class="key">Shell</tspan><tspan class="cc">: ..................... </tspan><tspan class="value">{{SHELL}}</tspan></text>

  <text x="410" y="150"><tspan class="head">- Tech Stack</tspan><tspan class="cc"> -----------------------------------------------------------</tspan></text>
  <text x="410" y="170"><tspan class="cc">. </tspan><tspan class="key">Languages</tspan><tspan class="cc">: ................. </tspan><tspan class="value">{{LANG_LANGUAGES}}</tspan></text>
  <text x="410" y="190"><tspan class="cc">. </tspan><tspan class="key">Frontend</tspan><tspan class="cc">: .................. </tspan><tspan class="value">{{LANG_FRONTEND}}</tspan></text>
  <text x="410" y="210"><tspan class="cc">. </tspan><tspan class="key">Backend</tspan><tspan class="cc">: ................... </tspan><tspan class="value">{{LANG_BACKEND}}</tspan></text>
  <text x="410" y="230"><tspan class="cc">. </tspan><tspan class="key">Database</tspan><tspan class="cc">: .................. </tspan><tspan class="value">{{LANG_DATABASE}}</tspan></text>
  <text x="410" y="250"><tspan class="cc">. </tspan><tspan class="key">Tools &amp; Environment</tspan><tspan class="cc">: ....... </tspan><tspan class="value">{{LANG_TOOLS}}</tspan></text>

  <text x="410" y="290"><tspan class="head">- Contact</tspan><tspan class="cc"> ---------------------------------------------------------------</tspan></text>
  <text x="410" y="310"><tspan class="cc">. </tspan><tspan class="key">Email</tspan><tspan class="cc">: ..................... </tspan><tspan class="value">{{EMAIL}}</tspan></text>
  <text x="410" y="370"><tspan class="cc">. </tspan><tspan class="key">X</tspan><tspan class="cc">: ......................... </tspan><tspan class="value">{{X_HANDLE}}</tspan></text>
  <text x="410" y="330"><tspan class="cc">. </tspan><tspan class="key">GitHub</tspan><tspan class="cc">: .................... </tspan><tspan class="value">{{GITHUB}}</tspan></text>
  <text x="410" y="350"><tspan class="cc">. </tspan><tspan class="key">LinkedIn</tspan><tspan class="cc">: .................. </tspan><tspan class="value">{{LINKEDIN}}</tspan></text>

  <text x="410" y="410"><tspan class="head">- GitHub Stats</tspan><tspan class="cc"> --------------------------------------------------------</tspan></text>
  <text x="410" y="430"><tspan class="cc">. </tspan><tspan class="key">Profile Views</tspan><tspan class="cc">: ............. </tspan><tspan id="views_data" class="value">{{VIEWS_DATA}}</tspan><tspan class="cc"> | </tspan><tspan class="key">Followers</tspan><tspan class="cc">: </tspan><tspan id="follower_data" class="value">{{FOLLOWER_DATA}}</tspan></text>
  <text x="410" y="450"><tspan class="cc">. </tspan><tspan class="key">Repos</tspan><tspan class="cc">: ..................... </tspan><tspan id="repo_data" class="value">{{REPO_DATA}}</tspan><tspan class="cc"> {Contributed: </tspan><tspan id="contrib_data" class="value">{{CONTRIB_DATA}}</tspan><tspan class="cc">} | </tspan><tspan class="key">Stars</tspan><tspan class="cc">: </tspan><tspan id="star_data" class="value">{{STAR_DATA}}</tspan></text>
  <text x="410" y="470"><tspan class="cc">. </tspan><tspan class="key">Commits</tspan><tspan class="cc">: ................... </tspan><tspan id="commit_data" class="value">{{COMMIT_DATA}}</tspan><tspan class="cc"> | </tspan><tspan class="key">Streak</tspan><tspan class="cc">: </tspan><tspan id="streak_current" class="value">{{STREAK_CURRENT}}</tspan><tspan class="cc"> (best </tspan><tspan id="streak_longest" class="value">{{STREAK_LONGEST}}</tspan><tspan class="cc">)</tspan></text>
  <text x="410" y="490"><tspan class="cc">. </tspan><tspan class="key">Pull Requests</tspan><tspan class="cc">: ............. </tspan><tspan id="pr_data" class="value">{{PR_DATA}}</tspan><tspan class="cc"> | </tspan><tspan class="key">Issues</tspan><tspan class="cc">: </tspan><tspan id="issue_data" class="value">{{ISSUE_DATA}}</tspan></text>
  <text x="410" y="510"><tspan class="cc">. </tspan><tspan class="key">Lines of Code</tspan><tspan class="cc">: ............. </tspan><tspan id="loc_data" class="value">{{LOC_DATA}}</tspan><tspan class="cc"> ( </tspan><tspan class="green">+{{LOC_ADD}}</tspan><tspan class="cc">, </tspan><tspan class="red">-{{LOC_DEL}}</tspan><tspan class="cc"> )</tspan></text>

  <text x="16" y="555" class="footer">last synced {{LAST_SYNCED}} &#183;</text>
</svg>